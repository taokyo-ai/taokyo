<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kennisbank – Taokyo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <span class="badge">Kennisbank</span>
    <h1>Alles wat je moet<br>weten, op één plek</h1>
    <p>Video's, artikelen en handleidingen om je verder te educeren over AI</p>
    <a href="#kennisbank" class="btn-primary">Bekijk de kennisbank</a>
  </div>

  <div class="fan-wrap">
    <div class="fan-card fan-1"><span class="fan-icon icon-doc"></span><span>Artikel</span></div>
    <div class="fan-card fan-2"><span class="fan-icon icon-play"></span><span>Video</span></div>
    <div class="fan-card fan-3"><span class="fan-icon icon-doc"></span><span>Artikel</span></div>
    <div class="fan-card fan-4"><span class="fan-icon icon-play"></span><span>Video</span></div>
    <div class="fan-card fan-5"><span class="fan-icon icon-doc"></span><span>Artikel</span></div>
    <div class="fan-card fan-6"><span class="fan-icon icon-play"></span><span>Video</span></div>
    <div class="fan-card fan-7"><span class="fan-icon icon-doc"></span><span>Artikel</span></div>

    <div class="arc-overlay"></div>

    <div class="pill pill-1"><span class="pill-icon icon-search"></span>Zoekfunctie</div>
    <div class="pill pill-2"><span class="pill-icon icon-play"></span>Video's</div>
    <div class="pill pill-3"><span class="pill-icon icon-doc"></span>Artikelen</div>
    <div class="pill pill-4"><span class="pill-icon icon-refresh"></span>Wekelijks nieuw</div>
  </div>
</section>

<!-- KENNISBANK GRID -->
<section class="kennisbank" id="kennisbank">
  <h2>Kennisbank</h2>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Alles</button>
    <button class="filter-btn" data-filter="video">Video's</button>
    <button class="filter-btn" data-filter="article">Artikelen</button>
  </div>

  <div class="kb-grid">

    <button class="kb-card" data-type="video"
      data-title="Introductie tot Taokyo AI"
      data-desc="Een korte video-introductie waarin we uitleggen wat het Taokyo AI Collective doet en waarom.">
      <span class="kb-icon icon-play"></span>
      <span class="kb-tag">Video</span>
      <h3>Introductie tot Taokyo AI</h3>
      <p>Maak in een paar minuten kennis met het collectief.</p>
    </button>

    <button class="kb-card" data-type="article"
      data-title="Wat is de Taokyo AI Collective?"
      data-desc="Een uitgebreid artikel over de missie, visie en werkwijze van Taokyo.">
      <span class="kb-icon icon-doc"></span>
      <span class="kb-tag">Artikel</span>
      <h3>Wat is de Taokyo AI Collective?</h3>
      <p>De missie, visie en werkwijze op een rij.</p>
    </button>

    <button class="kb-card" data-type="video"
      data-title="Hoe gebruik je de kennisbank"
      data-desc="Een uitlegvideo over het filteren en doorzoeken van video's en artikelen in de kennisbank.">
      <span class="kb-icon icon-play"></span>
      <span class="kb-tag">Video</span>
      <h3>Hoe gebruik je de kennisbank</h3>
      <p>Filteren en zoeken in twee minuten uitgelegd.</p>
    </button>

    <button class="kb-card" data-type="article"
      data-title="Veelgestelde vragen"
      data-desc="Antwoorden op de meest gestelde vragen over Taokyo, van toegang tot samenwerking.">
      <span class="kb-icon icon-doc"></span>
      <span class="kb-tag">Artikel</span>
      <h3>Veelgestelde vragen</h3>
      <p>Snelle antwoorden op de meest gestelde vragen.</p>
    </button>

    <button class="kb-card" data-type="video"
      data-title="Achter de schermen"
      data-desc="Een kijkje achter de schermen bij het team van Taokyo.">
      <span class="kb-icon icon-play"></span>
      <span class="kb-tag">Video</span>
      <h3>Achter de schermen</h3>
      <p>Een kijkje achter de schermen bij het team.</p>
    </button>

    <button class="kb-card" data-type="article"
      data-title="Roadmap 2026"
      data-desc="Wat Taokyo in 2026 gaat bouwen en waarom, in chronologische volgorde.">
      <span class="kb-icon icon-doc"></span>
      <span class="kb-tag">Artikel</span>
      <h3>Roadmap 2026</h3>
      <p>Wat we dit jaar gaan bouwen, stap voor stap.</p>
    </button>

  </div>
</section>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-media" id="modalMedia"></div>
    <span class="modal-tag" id="modalTag"></span>
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
